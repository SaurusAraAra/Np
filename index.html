<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JANGAN LIHAT TERLALU DEKAT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0b0b;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'Lucida Console', monospace;
            overflow: hidden;
            position: relative;
        }
        #noiseCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
            opacity: 0.08;
            mix-blend-mode: overlay;
        }
        .container {
            position: relative;
            z-index: 10;
            max-width: 780px;
            padding: 2rem 2.5rem;
            background: rgba(10, 10, 10, 0.75);
            backdrop-filter: blur(3px);
            border: 1px solid #2a1f1f;
            box-shadow: 0 0 40px rgba(80, 0, 0, 0.3), inset 0 0 30px rgba(20, 0, 0, 0.7);
            text-align: center;
            border-radius: 12px;
            transition: all 0.2s ease;
            animation: flickerBorder 4s infinite;
        }
        @keyframes flickerBorder {
            0%, 100% { border-color: #3f2a2a; box-shadow: 0 0 40px rgba(80, 0, 0, 0.3); }
            25% { border-color: #5a2e2e; box-shadow: 0 0 60px rgba(120, 0, 0, 0.5); }
            50% { border-color: #2a1a1a; box-shadow: 0 0 30px rgba(60, 0, 0, 0.2); }
            75% { border-color: #4d2222; box-shadow: 0 0 50px rgba(100, 0, 0, 0.4); }
        }
        .main-text {
            color: #b8b0a8;
            font-size: 1.9rem;
            font-weight: 400;
            letter-spacing: 3px;
            line-height: 1.6;
            text-shadow: 0 0 8px rgba(180, 40, 40, 0.3);
            margin-bottom: 2.2rem;
            border-left: 2px solid #4f2a2a;
            padding-left: 1.2rem;
            text-align: left;
            transition: all 0.3s;
        }
        .main-text span {
            display: inline-block;
            transition: all 0.2s;
        }
        .glitch-char {
            animation: glitchPulse 2.5s infinite;
        }
        @keyframes glitchPulse {
            0% { opacity: 1; text-shadow: 0 0 2px #a33, 0 0 8px #a33; }
            25% { opacity: 0.9; text-shadow: -2px 0 #a33, 2px 2px #3a1a1a; }
            50% { opacity: 1; text-shadow: 0 0 10px #b44, 0 0 20px #a22; }
            75% { opacity: 0.95; text-shadow: 2px -2px #a33, -1px 0 #3a1a1a; }
            100% { opacity: 1; text-shadow: 0 0 2px #a33, 0 0 8px #a33; }
        }
        .hex-line {
            color: #6a5a4a;
            font-size: 1.1rem;
            letter-spacing: 6px;
            word-break: break-all;
            background: #0f0c0c;
            padding: 0.6rem 1rem;
            border: 1px solid #2a1e1e;
            border-radius: 4px;
            margin: 1.8rem 0 1rem 0;
            font-family: 'Courier New', monospace;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            transition: all 0.5s;
            cursor: default;
            position: relative;
        }
        .hex-line:hover {
            background: #140f0f;
            border-color: #5a2e2e;
            box-shadow: 0 0 30px rgba(120, 0, 0, 0.3);
        }
        .sub-line {
            color: #6e5e4e;
            font-size: 0.85rem;
            letter-spacing: 2px;
            margin-top: 1.2rem;
            border-top: 1px dashed #2a1e1e;
            padding-top: 1.2rem;
            opacity: 0.5;
            transition: opacity 0.3s;
        }
        .sub-line:hover {
            opacity: 0.9;
        }
        .blink-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #8a5a4a;
            margin-left: 6px;
            vertical-align: text-bottom;
            animation: blink 1.2s step-end infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        @media (max-width: 550px) {
            .container { padding: 1.2rem 1rem; }
            .main-text { font-size: 1.2rem; padding-left: 0.8rem; }
            .hex-line { font-size: 0.8rem; letter-spacing: 3px; }
        }
    </style>
</head>
<body>

    <canvas id="noiseCanvas"></canvas>

    <div class="container">
        <div class="main-text" id="typewriter">
            <span>Aku tidak pernah benar-benar pergi.</span><br>
            <span>Aku hanya menyembunyikan namaku.</span><br>
            <span style="color:#9a8a7a; font-size:1.4rem;">Lihat lebih dekat.</span>
        </div>

        <div class="hex-line" id="hexDisplay">
            4a 75 73 74
            <span class="blink-cursor"></span>
        </div>

        <div class="sub-line">
            ⚡ kau merasa ada yang mengawasi ⚡
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('noiseCanvas');
            const ctx = canvas.getContext('2d');
            let w, h;

            function resizeCanvas() {
                w = window.innerWidth;
                h = window.innerHeight;
                canvas.width = w;
                canvas.height = h;
            }
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            function generateNoise() {
                const imageData = ctx.createImageData(w, h);
                const data = imageData.data;
                for (let i = 0; i < data.length; i += 4) {
                    const value = Math.random() * 255;
                    data[i] = value;
                    data[i+1] = value;
                    data[i+2] = value;
                    data[i+3] = 255;
                }
                ctx.putImageData(imageData, 0, 0);
                requestAnimationFrame(generateNoise);
            }
            generateNoise();

            const container = document.querySelector('.main-text');
            const originalHTML = container.innerHTML;
            container.innerHTML = originalHTML;

            const hexEl = document.getElementById('hexDisplay');
            const originalHex = '4a 75 73 74';
            let glitchInterval;

            function glitchHex() {
                if (Math.random() < 0.3) {
                    const chars = '0123456789abcdef';
                    let newHex = '';
                    for (let i = 0; i < 8; i++) {
                        if (Math.random() < 0.25) {
                            newHex += chars[Math.floor(Math.random() * chars.length)];
                        } else {
                            newHex += originalHex[i] || ' ';
                        }
                        if (i === 1 || i === 3 || i === 5) newHex += ' ';
                    }
                    hexEl.innerHTML = newHex + ' <span class="blink-cursor"></span>';
                } else {
                    hexEl.innerHTML = originalHex + ' <span class="blink-cursor"></span>';
                }
            }

            glitchInterval = setInterval(glitchHex, 1800);
            glitchHex();
<!-- not Just -->

<!-- image.png -->
            const mainTextSpans = document.querySelectorAll('.main-text span');
            function randomGlitchText() {
                const lines = document.querySelectorAll('.main-text span');
                if (lines.length === 0) return;
                const idx = Math.floor(Math.random() * lines.length);
                const line = lines[idx];
                if (!line.dataset.original) {
                    line.dataset.original = line.textContent;
                }
                if (Math.random() < 0.25) {
                    const glitchChars = '⍰ ⍟ ⍣ ⍤ ⍥ ⍦ ⍧ ⍨ ⍩ ⍪ ⍫ ⍬ ⍭ ⍮ ⍯';
                    const chars = glitchChars.split(' ');
                    const randomChar = chars[Math.floor(Math.random() * chars.length)];
                    line.textContent = randomChar + ' ' + randomChar;
                    setTimeout(() => {
                        line.textContent = line.dataset.original;
                    }, 400);
                } else if (Math.random() < 0.2) {
                    const hex = '0x' + Math.floor(Math.random()*0xFFFF).toString(16).toUpperCase();
                    line.textContent = hex;
                    setTimeout(() => {
                        line.textContent = line.dataset.original;
                    }, 500);
                }
            }

            setInterval(randomGlitchText, 3200);

            const containerDiv = document.querySelector('.container');
            let flickerInterval = setInterval(() => {
                if (Math.random() < 0.1) {
                    containerDiv.style.borderColor = '#6a2a2a';
                    containerDiv.style.boxShadow = '0 0 80px rgba(120,0,0,0.6), inset 0 0 50px rgba(40,0,0,0.8)';
                    setTimeout(() => {
                        containerDiv.style.borderColor = '';
                        containerDiv.style.boxShadow = '';
                    }, 200);
                }
            }, 3000);

            let hexToggle = false;
            setInterval(() => {
                if (Math.random() < 0.2) {
                    hexEl.innerHTML = '4a 75 73 74 20 2d 2d 3e 20 4a 75 73 74 <span class="blink-cursor"></span>';
                    setTimeout(() => {
                        hexEl.innerHTML = originalHex + ' <span class="blink-cursor"></span>';
                    }, 1200);
                }
            }, 5000);

            document.addEventListener('dblclick', function(e) {
                const hidden = document.querySelector('.hidden-message');
                if (hidden) {
                    hidden.style.color = '#6a3a3a';
                    hidden.style.opacity = '1';
                    hidden.style.fontSize = '0.9rem';
                    hidden.innerHTML = '&#9889; kau terlalu dekat &#9889; <br> ';
                    setTimeout(() => {
                        hidden.style.color = '#1f1414';
                        hidden.style.opacity = '0.25';
                        hidden.style.fontSize = '0.6rem';
                        hidden.innerHTML = '';
                    }, 2500);
                }
            });

            console.log('4a 75 73 74 — Just');
            console.log('⚠️ jangan terlalu dekat ⚠️');

        })();
    </script>

</body>
</html>
